name: Deploy WebFlasher

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest release firmware
        env:
          GH_TOKEN: ${{ github.token }}
          MERGED_ASSET: FlightScnr-tencoder-pro-merged.bin
        run: |
          set -euo pipefail
          mkdir -p docs/firmware
          if gh release download --repo "${GITHUB_REPOSITORY}" --latest \
            --pattern "${MERGED_ASSET}" \
            --dir docs/firmware \
            --clobber; then
            export FIRMWARE_SIZE="$(stat -c%s "docs/firmware/${MERGED_ASSET}")"
            export RELEASE_NAME="$(gh release view --repo "${GITHUB_REPOSITORY}" --json name -q .name)"
            export RELEASE_TAG="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName -q .tagName)"
            jq -n \
              --arg name "${RELEASE_NAME}" \
              --arg version "${RELEASE_TAG}" \
              --arg path "${MERGED_ASSET}" \
              --argjson size "${FIRMWARE_SIZE}" \
              '{name: $name, version: $version, size: $size, builds: [{chipFamily: "ESP32-S3", parts: [{path: $path, offset: 0}]}]}' \
              > docs/firmware/manifest.json
            echo "Bundled ${RELEASE_NAME} (${FIRMWARE_SIZE} bytes)"
          else
            echo "No release asset yet; installer will deploy without bundled firmware."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

[env:crowpanel-21]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
;platform = espressif32@7.0.1
;board = esp32s3_120_16_8-qio_opi
board = esp32-s3-devkitc1-n16r8
custom_sdkconfig            = CONFIG_SPIRAM_USE_MALLOC=y
                              CONFIG_MBEDTLS_DYNAMIC_BUFFER=y
                              CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC=y
                              CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL = 4096
                              CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL=50768

custom_component_remove     = espressif/esp_hosted
                              espressif/esp_wifi_remote
                              espressif/qrcode
                              espressif/esp_insights
                              espressif/esp_diag_data_store
                              espressif/esp_diagnostics
                              espressif/esp_rainmaker
                              espressif/rmaker_common

framework = arduino
monitor_speed = 115200
upload_speed = 921600
;upload_port = COM4
;monitor_port = COM4
monitor_filters = esp32_exception_decoder

extra_scripts =
  pre:scripts/generate_icao_types.py
  pre:scripts/generate_airports.py
  post:scripts/merge_firmware.py

board_build.arduino.memory_type = qio_opi
board_build.arduino.partitions = default_16MB.csv
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB

build_flags =
  -Wall
  -D CORE_DEBUG_LEVEL=1
  -D BOARD_HAS_PSRAM
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_RUNNING_CORE=1
  -D ARDUINO_EVENT_RUNNING_CORE=1
  -mfix-esp32-psram-cache-issue
  -D CROWPANEL21
  ;-D ENABLE_SOUND
  ; Panel: auto-detect at boot (I2C touch probe, saved to NVS).
  ; Override: -D FLIGHTSCNR_PANEL_DXQ or -D FLIGHTSCNR_PANEL_TFD12
  -D WM_NODEBUG
  -D WM_MDNS
  -I include/hardware

lib_deps =
  tzapu/WiFiManager@^2.0.17
  bblanchon/ArduinoJson@^7.4.2
  ;xreef/PCF8574 library@^2.4.0
  adafruit/Adafruit PCF8574@^1.1.2
  moononournation/GFX Library for Arduino@^1.6.6
  adafruit/Adafruit CST8XX Library@^1.1.1
  adafruit/Adafruit BusIO@^1.17.4

